name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            asset_name: bitclk-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            asset_name: bitclk-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            asset_name: bitclk-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/bitclk" dist/
          tar -czf "${{ matrix.asset_name }}.${{ matrix.archive_ext }}" -C dist bitclk

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bitclk.exe" "dist/bitclk.exe"
          Compress-Archive -Path "dist/bitclk.exe" -DestinationPath "${{ matrix.asset_name }}.${{ matrix.archive_ext }}" -Force

      - name: Upload build archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
